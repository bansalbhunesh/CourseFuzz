name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: coursefuzz_test
          POSTGRES_USER: coursefuzz
          POSTGRES_PASSWORD: coursefuzz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coursefuzz -d coursefuzz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_TEST_URL: postgresql://coursefuzz:coursefuzz_test@127.0.0.1:5432/coursefuzz_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check src tests scripts evaluations
      - run: python scripts/release_guard.py
      - run: python scripts/verify_real_manifest.py
      - run: python -m pytest --cov=coursefuzz --cov-report=term-missing

  frozen-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/run_frozen_benchmark.py --no-write

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag coursefuzz:ci .
      - name: Start production image
        run: >-
          docker run --detach --name coursefuzz-ci --publish 8000:8000
          --env COURSEFUZZ_COMMIT_SHA=${{ github.sha }} coursefuzz:ci
      - name: Verify health and compiled frontend
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/api/health > health.json; then
              break
            fi
            sleep 1
          done
          python -c "import json; data=json.load(open('health.json')); assert data['status']=='ok'; assert data['commit']=='${{ github.sha }}'"
          curl --fail --silent http://127.0.0.1:8000/ | grep --quiet CourseFuzz
      - name: Show container logs on failure
        if: failure()
        run: docker logs coursefuzz-ci
      - name: Stop production image
        if: always()
        run: docker rm --force coursefuzz-ci

  isolated-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - name: Install gVisor (runsc) and register the Docker runtime
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          URL="https://storage.googleapis.com/gvisor/releases/release/latest/${ARCH}"
          wget --quiet \
            "${URL}/runsc" "${URL}/runsc.sha512" \
            "${URL}/containerd-shim-runsc-v1" "${URL}/containerd-shim-runsc-v1.sha512"
          sha512sum -c runsc.sha512 -c containerd-shim-runsc-v1.sha512
          chmod +x runsc containerd-shim-runsc-v1
          sudo mv runsc containerd-shim-runsc-v1 /usr/local/bin/
          sudo /usr/local/bin/runsc install
          sudo systemctl reload docker || sudo systemctl restart docker
      - name: Verify the runsc runtime is registered
        run: docker info --format '{{range $k,$v := .Runtimes}}{{$k}} {{end}}' | grep -qw runsc
      - name: Build the execution image
        run: docker build --tag coursefuzz:local .
      - name: Run isolated-runner tests (runc and runsc live)
        run: python -m pytest tests/test_docker_isolated_runner.py -v
