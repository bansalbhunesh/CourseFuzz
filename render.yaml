services:
  - type: web
    name: coursefuzz
    runtime: docker
    plan: free
    region: singapore
    numInstances: 1
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coursefuzz-db
          property: connectionString
      - key: COURSEFUZZ_ACCESS_KEYS_JSON
        sync: false
      - key: COURSEFUZZ_GITHUB_TOKEN
        sync: false
      - key: COURSEFUZZ_GITHUB_ALLOWED_REPOS
        sync: false
      - key: COURSEFUZZ_GITHUB_APP_ID
        sync: false
      - key: COURSEFUZZ_GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: COURSEFUZZ_GITHUB_INSTALLATIONS_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COURSEFUZZ_COOKIE_SECURE
        value: "1"
      - key: COURSEFUZZ_MODEL
        value: gpt-5.6-sol

databases:
  - name: coursefuzz-db
    plan: free
    region: singapore
    databaseName: coursefuzz
    user: coursefuzz
